<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bar 3D Multiplayer</title>
    <script>
      if (location.protocol === "file:") {
        location.replace("http://localhost:3000/");
      }
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three.module.js"
        }
      }
    </script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Sala virtual 3D de bar">
        <div class="topbar">
          <div>
            <span class="kicker">Bar online 3D</span>
            <h1>Neon Tap Room</h1>
          </div>
          <div class="status">
            <span class="live-dot"></span>
            <span id="roleBadge" class="role-badge">visitante</span>
            <span id="onlineCount">Conectando</span>
          </div>
        </div>

        <div class="world-shell" id="worldShell">
          <canvas id="worldCanvas" aria-label="Mapa 3D multiplayer"></canvas>
          <div class="nameplates" id="nameplates"></div>
          <div class="world-hud">
            <button id="cameraButton" type="button">Câmera</button>
            <button id="placeButton" class="admin-only" type="button" disabled>Colocar GLB</button>
            <label class="file-picker admin-only">
              <input id="glbInput" type="file" accept=".glb,model/gltf-binary">
              Importar GLB
            </label>
            <button id="exportButton" class="admin-only" type="button">Exportar personagem</button>
          </div>
          <div class="asset-dock admin-only">
            <div class="asset-title">GLBs no mapa</div>
            <div id="assetList" class="asset-list">Nenhum GLB colocado</div>
          </div>
        </div>

        <div class="controls" aria-label="Controles de movimento">
          <button data-step="up" aria-label="Andar para frente">↑</button>
          <button data-step="left" aria-label="Andar para esquerda">←</button>
          <button data-step="down" aria-label="Andar para trás">↓</button>
          <button data-step="right" aria-label="Andar para direita">→</button>
        </div>
      </section>

      <aside class="chat-panel" aria-label="Chat da sala">
        <div class="identity">
          <label for="nameInput">Apelido</label>
          <div class="name-row">
            <input id="nameInput" maxlength="18" autocomplete="nickname" placeholder="Seu nome">
            <button id="joinButton" type="button">Entrar</button>
          </div>
        </div>

        <div class="chat-log" id="chatLog"></div>

        <form class="chat-form" id="chatForm">
          <input id="chatInput" maxlength="120" autocomplete="off" placeholder="Digite uma mensagem...">
          <button type="submit">Enviar</button>
        </form>
      </aside>
    </main>

    <div class="file-mode-hint">
      Abra pelo servidor local: <a href="http://localhost:3000/">http://localhost:3000</a>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
